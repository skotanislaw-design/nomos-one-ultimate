<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#071220"/>

  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F56B3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#071220;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main shape - Legal document/law book concept -->
  <g>
    <!-- Book spine -->
    <rect x="150" y="120" width="212" height="280" rx="16" fill="url(#grad1)" stroke="#ffffff" stroke-width="8"/>

    <!-- Book pages detail -->
    <line x1="170" y1="160" x2="342" y2="160" stroke="#ffffff" stroke-width="4" opacity="0.6"/>
    <line x1="170" y1="200" x2="342" y2="200" stroke="#ffffff" stroke-width="4" opacity="0.5"/>
    <line x1="170" y1="240" x2="342" y2="240" stroke="#ffffff" stroke-width="4" opacity="0.4"/>
    <line x1="170" y1="280" x2="342" y2="280" stroke="#ffffff" stroke-width="4" opacity="0.3"/>

    <!-- Seal/badge in corner -->
    <circle cx="340" cy="140" r="35" fill="#FF6B6B" stroke="#ffffff" stroke-width="3"/>
    <text x="340" y="155" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">✓</text>
  </g>
</svg>
